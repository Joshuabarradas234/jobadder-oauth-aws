name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dev dependencies
        run: npm install
      - name: Lint (ESLint)
        run: npm run lint
      - name: Unit tests (node:test)
        run: npm test

  validate-cloudformation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Validate CloudFormation template
        run: cfn-lint cloudformation.yaml
